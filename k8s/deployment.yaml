apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiori-mcp-test
  namespace: fiori-mcp-test
  labels:
    app: fiori-mcp-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fiori-mcp-test
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "true"
      labels:
        app: fiori-mcp-test
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: fiori-mcp-test
          image: "ghcr.io/dohyun-mun/fiori-mcp-test:latest"
          imagePullPolicy: Always
          ports:
            - containerPort: 4004
          env:
            - name: NODE_ENV
              value: "production"
            - name: CDS_ENV
              value: "production"
            - name: SERVICE_BINDING_ROOT
              value: "/bindings"
          volumeMounts:
            - name: hana-hdi-secret-vol
              mountPath: /bindings/hana-hdi
              readOnly: true
            - name: service-binding-root
              mountPath: /etc/secrets/sapcp/hana/hana-hdi
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: hana-hdi-secret-vol
          secret:
            secretName: hana-hdi-secret
        - name: service-binding-root
          secret:
            secretName: hana-hdi-secret