apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-pjt
  namespace: store-pjt
  labels:
    app: store-pjt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-pjt
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "true"
      labels:
        app: store-pjt
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: store-pjt
          image: "ghcr.io/dohyun-mun/store-pjt:v9-fixes"
          imagePullPolicy: Always
          ports:
            - containerPort: 4004
          env:
            - name: NODE_ENV
              value: "production"
            - name: CDS_ENV
              value: "production"
            - name: SERVICE_BINDING_ROOT
              value: "/bindings"
            - name: AICORE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: aicore-secret
                  key: AICORE_SERVICE_KEY
            - name: AICORE_RESOURCE_GROUP
              valueFrom:
                secretKeyRef:
                  name: aicore-secret
                  key: AICORE_RESOURCE_GROUP
            - name: AICORE_DEPLOYMENT_ID
              valueFrom:
                secretKeyRef:
                  name: aicore-secret
                  key: AICORE_DEPLOYMENT_ID
            - name: MCP_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: aicore-secret
                  key: MCP_SERVER_URL
          volumeMounts:
            - name: hana-hdi-secret-vol
              mountPath: /bindings/hana-hdi
              readOnly: true
            - name: service-binding-root
              mountPath: /etc/secrets/sapcp/hana/hana-hdi
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: hana-hdi-secret-vol
          secret:
            secretName: hana-hdi-secret
        - name: service-binding-root
          secret:
            secretName: hana-hdi-secret