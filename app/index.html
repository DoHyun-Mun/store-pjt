<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>점포 상품별 재고 발주 관리 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --shell-bg: #FFFFFF;
            --shell-text: #1D2D3E;
            --shell-border: #E8E8E8;
            --primary: #0070F2;
            --primary-hover: #0058C6;
            --primary-light: #EBF3FE;
            --bg: #F5F6FA;
            --card-bg: #FFFFFF;
            --text: #1D2D3E;
            --text-secondary: #556B82;
            --text-tertiary: #8396A8;
            --border: #E5E8ED;
            --border-light: #EEF1F5;
            --sidebar-width: 260px;
            --sidebar-collapsed: 56px;
            --shell-height: 48px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --shadow-sm: 0 1px 4px rgba(29,45,62,0.06);
            --shadow-md: 0 4px 16px rgba(29,45,62,0.08);
            --shadow-lg: 0 8px 32px rgba(29,45,62,0.1);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --success: #188038;
            --success-light: #E6F4EA;
            --warning: #E37400;
            --warning-light: #FEF3E0;
            --danger: #D93025;
            --danger-light: #FCE8E6;
            --info: #1A73E8;
            --info-light: #E8F0FE;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', '72', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* === Shell Bar === */
        .shell-bar {
            height: var(--shell-height); background: var(--shell-bg); color: var(--shell-text);
            display: flex; align-items: center; padding: 0 1.25rem;
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            border-bottom: 1px solid var(--shell-border); box-shadow: var(--shadow-sm);
        }
        .shell-bar .menu-toggle {
            background: none; border: none; color: var(--text-secondary);
            cursor: pointer; padding: 0.4rem; border-radius: var(--radius-sm);
            margin-right: 0.75rem; transition: all var(--transition);
            display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;
        }
        .shell-bar .menu-toggle:hover { background: var(--primary-light); color: var(--primary); }
        .shell-bar .logo {
            display: flex; align-items: center; gap: 0.65rem;
            font-size: 0.9rem; font-weight: 600; color: var(--text);
            text-decoration: none; cursor: pointer; margin-right: 1.5rem;
        }
        .shell-bar .logo-mark { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
        .shell-bar .logo-mark svg { width: 28px; height: 28px; }
        .shell-bar .logo-title { display: flex; flex-direction: column; line-height: 1.15; }
        .shell-bar .logo-title .title-main { font-size: 0.88rem; font-weight: 700; letter-spacing: -0.01em; }
        .shell-bar .logo-title .title-sub { font-size: 0.6rem; font-weight: 500; color: var(--text-tertiary); letter-spacing: 0.02em; }
        .shell-bar .spacer { flex: 1; }
        .shell-bar .shell-actions { display: flex; align-items: center; gap: 0.25rem; }
        .shell-bar .shell-actions a {
            color: var(--text-secondary); text-decoration: none; font-size: 0.78rem;
            padding: 0.35rem 0.7rem; border-radius: var(--radius-sm);
            transition: all var(--transition); font-weight: 500;
        }
        .shell-bar .shell-actions a:hover { background: var(--primary-light); color: var(--primary); }
        .shell-bar .user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #0070F2, #6B4FBB);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 600; margin-left: 0.75rem; color: white;
        }

        /* === Top Menu === */
        .top-menu-group { display: flex; align-items: center; gap: 0.15rem; height: 100%; margin-left: 0.5rem; }
        .top-menu-item {
            display: flex; align-items: center; gap: 0.35rem; padding: 0.35rem 0.75rem;
            color: var(--text-secondary); font-size: 0.8rem; font-weight: 500;
            cursor: pointer; border: none; background: none; border-radius: var(--radius-sm);
            transition: all var(--transition); white-space: nowrap; height: 32px;
        }
        .top-menu-item:hover { color: var(--primary); background: var(--primary-light); }
        .top-menu-item.active { color: var(--primary); background: var(--primary-light); font-weight: 600; }

        /* === Sidebar === */
        .sidebar {
            position: fixed; top: var(--shell-height); left: 0; bottom: 0;
            width: var(--sidebar-width); background: var(--card-bg);
            border-right: 1px solid var(--border); overflow-y: auto; z-index: 90;
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1), transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .sidebar.collapsed { width: var(--sidebar-collapsed); }
        .sidebar.collapsed .nav-text, .sidebar.collapsed .nav-group-title { display: none; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 0.65rem; }
        .nav-group-title {
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
            color: var(--text-tertiary); padding: 1.25rem 1.1rem 0.4rem; letter-spacing: 0.08em;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .nav-item {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.55rem 1.1rem 0.55rem 1.8rem; color: var(--text-secondary);
            text-decoration: none; font-size: 0.82rem; font-weight: 500;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin-right: 0.5rem;
            transition: all var(--transition); cursor: pointer;
        }
        .nav-item:hover { background: var(--primary-light); color: var(--primary); }
        .nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
        .nav-item .nav-icon { font-size: 1rem; width: 22px; text-align: center; }

        /* === Main === */
        .main {
            margin-left: var(--sidebar-width); margin-top: var(--shell-height);
            padding: 0; transition: margin-left 0.3s cubic-bezier(0.4,0,0.2,1);
            min-height: calc(100vh - var(--shell-height)); display: flex; flex-direction: column;
        }
        .main.expanded { margin-left: var(--sidebar-collapsed); }

        /* === Dashboard === */
        .dashboard-view { padding: 1rem 1.5rem 1.5rem; overflow-y: auto; height: calc(100vh - var(--shell-height)); }
        .dash-header { margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: space-between; }
        .dash-header h2 { font-size: 1.1rem; font-weight: 700; }
        .dash-header .dash-date { font-size: 0.78rem; color: var(--text-tertiary); }

        /* KPI Row */
        .kpi-row {
            display: grid; grid-template-columns: repeat(6, 1fr);
            gap: 0.6rem; margin-bottom: 1rem;
        }
        .kpi-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-md);
            padding: 1rem 1.15rem; display: flex; align-items: center; gap: 0.85rem;
            box-shadow: var(--shadow-sm); transition: all var(--transition); position: relative; overflow: hidden;
        }
        .kpi-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
        .kpi-card .kpi-icon-wrap {
            width: 42px; height: 42px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0;
        }
        .kpi-card .kpi-body { display: flex; flex-direction: column; }
        .kpi-card .kpi-value { font-size: 1.35rem; font-weight: 700; line-height: 1.2; }
        .kpi-card .kpi-label { font-size: 0.7rem; font-weight: 500; color: var(--text-tertiary); margin-top: 0.1rem; }

        /* Chart Cards Row */
        .chart-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
        .chart-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-md);
            padding: 0.75rem 1rem; box-shadow: var(--shadow-sm); display: flex; flex-direction: column;
        }
        .chart-card .chart-title {
            font-size: 0.78rem; font-weight: 600; color: var(--text); margin-bottom: 0.4rem;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .chart-card .chart-title .ct-icon { font-size: 1rem; }
        .chart-card .chart-wrap { flex: 1; position: relative; min-height: 120px; max-height: 150px; }
        .chart-card canvas { width: 100% !important; }

        /* Shortcut Row */
        .shortcut-section { margin-bottom: 1rem; }
        .shortcut-section h3 { font-size: 0.88rem; font-weight: 600; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.35rem; }
        .shortcut-row {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.6rem;
        }
        .shortcut-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 0.7rem 0.9rem; display: flex; align-items: center; gap: 0.55rem;
            cursor: pointer; transition: all var(--transition); color: var(--text);
            font-size: 0.8rem; font-weight: 500; text-decoration: none;
        }
        .shortcut-card:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

        /* Iframe */
        .content-frame { flex: 1; width: 100%; border: none; min-height: calc(100vh - var(--shell-height)); }
        .content-frame-wrap { position: relative; flex: 1; display: none; min-height: calc(100vh - var(--shell-height)); }
        .content-frame-wrap iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
        .frame-loader { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 5; transition: opacity 0.3s; }
        .frame-loader.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { margin-top: 12px; font-size: 0.85rem; color: var(--text-tertiary); }

        /* Responsive */
        @media (max-width: 1024px) { .chart-row { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: var(--sidebar-width); }
            .sidebar.mobile-open { transform: translateX(0); box-shadow: var(--shadow-lg); }
            .main { margin-left: 0 !important; }
            .chart-row { grid-template-columns: 1fr; }
            .top-menu-group { overflow-x: auto; }
        }
    </style>
</head>
<body>

<header class="shell-bar">
    <button class="menu-toggle" onclick="toggleSidebar()" title="메뉴 토글">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <rect y="2" width="16" height="1.5" rx="0.75"/><rect y="7.25" width="16" height="1.5" rx="0.75"/><rect y="12.5" width="16" height="1.5" rx="0.75"/>
        </svg>
    </button>
    <a class="logo" onclick="showDashboard()">
        <div class="logo-mark">
            <svg viewBox="0 0 32 32" fill="none"><rect x="2" y="6" width="12" height="12" rx="3" fill="#0070F2"/><rect x="18" y="6" width="12" height="12" rx="3" fill="#0070F2" opacity="0.6"/><rect x="2" y="22" width="12" height="4" rx="2" fill="#0070F2" opacity="0.35"/><rect x="18" y="22" width="12" height="4" rx="2" fill="#0070F2" opacity="0.35"/></svg>
        </div>
        <div class="logo-title">
            <span class="title-main">점포별 상품 재고 발주 관리</span>
            <span class="title-sub">Inventory &amp; Order Management</span>
        </div>
    </a>
    <div class="top-menu-group" id="topMenuBar"><span style="color:var(--text-tertiary);font-size:0.78rem;">로딩중...</span></div>
    <div class="spacer"></div>
    <div class="shell-actions">
        <a href="/inventory/$metadata" title="OData Metadata">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-2px;margin-right:3px;"><circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="2" fill="currentColor"/></svg>API
        </a>
    </div>
    <div class="user-avatar" title="사용자">U</div>
</header>

<nav class="sidebar" id="sidebar">
    <div style="padding:1.5rem 1.1rem;color:var(--text-tertiary);font-size:0.8rem;text-align:center;">로딩중...</div>
</nav>

<main class="main" id="main">
    <!-- Dashboard -->
    <div class="dashboard-view" id="welcomeView">
        <div class="dash-header">
            <h2>📊 대시보드</h2>
            <span class="dash-date" id="dashDate"></span>
        </div>

        <!-- KPI Cards -->
        <div class="kpi-row" id="kpiRow">
            <div class="kpi-card"><div class="kpi-icon-wrap" style="background:var(--info-light);color:var(--info)">🏷️</div><div class="kpi-body"><span class="kpi-value" id="kpi-products">-</span><span class="kpi-label">상품</span></div></div>
            <div class="kpi-card"><div class="kpi-icon-wrap" style="background:var(--success-light);color:var(--success)">🏪</div><div class="kpi-body"><span class="kpi-value" id="kpi-stores">-</span><span class="kpi-label">점포</span></div></div>
            <div class="kpi-card"><div class="kpi-icon-wrap" style="background:var(--warning-light);color:var(--warning)">📦</div><div class="kpi-body"><span class="kpi-value" id="kpi-inventories">-</span><span class="kpi-label">재고 항목</span></div></div>
            <div class="kpi-card"><div class="kpi-icon-wrap" style="background:var(--danger-light);color:var(--danger)">📋</div><div class="kpi-body"><span class="kpi-value" id="kpi-purchaseorders">-</span><span class="kpi-label">발주</span></div></div>
            <div class="kpi-card"><div class="kpi-icon-wrap" style="background:#F3E8FD;color:#7B2FF2">🤝</div><div class="kpi-body"><span class="kpi-value" id="kpi-suppliers">-</span><span class="kpi-label">공급업체</span></div></div>
            <div class="kpi-card"><div class="kpi-icon-wrap" style="background:#E0F7FA;color:#00838F">👤</div><div class="kpi-body"><span class="kpi-value" id="kpi-customers">-</span><span class="kpi-label">고객</span></div></div>
        </div>

        <!-- Chart Cards -->
        <div class="chart-row">
            <div class="chart-card">
                <div class="chart-title"><span class="ct-icon">📈</span> 일별 매출 추이</div>
                <div class="chart-wrap"><canvas id="chartSales"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-title"><span class="ct-icon">📦</span> 재고 추이</div>
                <div class="chart-wrap"><canvas id="chartInventory"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-title"><span class="ct-icon">📋</span> 발주 승인 현황</div>
                <div class="chart-wrap"><canvas id="chartOrders"></canvas></div>
            </div>
        </div>

        <!-- Shortcuts -->

        <!-- Supply Chain Network Graph -->
        <div class="chart-card" style="margin-bottom:1rem;">
            <div class="chart-title" style="justify-content:space-between;">
                <span><span class="ct-icon">🔗</span> 공급망 네트워크 (Supply Chain)</span>
                <span style="font-size:0.65rem;color:var(--text-tertiary);font-weight:400;">🟣 공급업체&nbsp;&nbsp;&nbsp;🟡 자재&nbsp;&nbsp;&nbsp;🔵 상품&nbsp;&nbsp;&nbsp;🟢 점포</span>
            </div>
            <div id="supplyChainGraph" style="width:100%;height:350px;border:1px solid var(--border-light);border-radius:8px;background:#FAFBFC;"></div>
        </div>
        <div class="shortcut-section">
            <h3>⚡ 바로가기</h3>
            <div class="shortcut-row" id="shortcutGrid"></div>
        </div>
    </div>

    <div class="content-frame-wrap" id="contentFrameWrap">
        <div id="frameLoader" class="frame-loader hidden">
            <div style="text-align:center"><div class="spinner"></div><div class="loader-text">앱 로딩 중...</div></div>
        </div>
        <iframe id="contentFrame"></iframe>
    </div>
</main>

<script>
let menuTree = [];
let activeTopMenuId = null;
let salesChart, inventoryChart, ordersChart;

// Date display
document.getElementById('dashDate').textContent = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

async function loadMenuData() {
    try {
        const res = await fetch('/inventory/MenuItems?$filter=isActive eq true&$orderby=sortOrder asc&$select=ID,code,title,icon,level,url,parent_ID,sortOrder');
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        const items = data.value || [];
        const map = {};
        items.forEach(i => { map[i.ID] = { ...i, children: [] }; });
        const roots = [];
        items.forEach(i => {
            if (i.parent_ID && map[i.parent_ID]) map[i.parent_ID].children.push(map[i.ID]);
            else if (!i.parent_ID) roots.push(map[i.ID]);
        });
        menuTree = roots;
        renderTopMenu();
        if (menuTree.length > 0) selectTopMenu(menuTree[0].ID);
    } catch (e) {
        console.error('메뉴 로드 실패:', e);
        document.getElementById('topMenuBar').innerHTML = '<span style="color:var(--text-tertiary);font-size:0.78rem;">메뉴 로드 실패</span>';
    }
}

function renderTopMenu() {
    const bar = document.getElementById('topMenuBar');
    bar.innerHTML = menuTree.map(i =>
        `<button class="top-menu-item" data-id="${i.ID}" onclick="selectTopMenu('${i.ID}')">${i.icon||'📁'} ${i.title}</button>`
    ).join('');
}

function showDashboard() {
    document.getElementById('welcomeView').style.display = '';
    document.getElementById('contentFrameWrap').style.display = 'none';
    document.getElementById('contentFrame').src = '';
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.top-menu-item').forEach(i => i.classList.remove('active'));
    loadDashboardData();
}

async function loadDashboardData() {
    // KPI counts
    const kpis = [
        { id: 'kpi-products', entity: 'Products' },
        { id: 'kpi-stores', entity: 'Stores' },
        { id: 'kpi-inventories', entity: 'Inventories' },
        { id: 'kpi-purchaseorders', entity: 'PurchaseOrders' },
        { id: 'kpi-suppliers', entity: 'Suppliers' },
        { id: 'kpi-customers', entity: 'Customers' }
    ];
    for (const kp of kpis) {
        try {
            const r = await fetch(`/inventory/${kp.entity}/$count`);
            if (r.ok) { const c = await r.text(); document.getElementById(kp.id).textContent = Number(c).toLocaleString(); }
        } catch(e) {}
    }

    // Charts
    await loadSalesChart();
    await loadInventoryChart();
    await loadOrdersChart();

    // Shortcuts
    renderShortcuts();
    await loadSupplyChainGraph();
}

async function loadSalesChart() {
    try {
        const res = await fetch("/inventory/DailySales?$orderby=salesDate desc&$select=salesDate,revenue&$top=175");

        if (!res.ok) return;
        const data = await res.json();
        const items = data.value || [];
        // Aggregate by date
        const dateMap = {};
        items.forEach(i => {
            const d = i.salesDate;
            dateMap[d] = (dateMap[d] || 0) + parseFloat(i.revenue);
        });
        const dates = Object.keys(dateMap).sort().slice(-7);
        const values = dates.map(d => dateMap[d]);
        const labels = dates.map(d => { const p = d.split('-'); return `${p[1]}/${p[2]}`; });

        if (salesChart) salesChart.destroy();
        salesChart = new Chart(document.getElementById('chartSales'), {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: '매출액',
                    data: values,
                    borderColor: '#0070F2',
                    backgroundColor: 'rgba(0,112,242,0.08)',
                    borderWidth: 2.5,
                    pointRadius: 4,
                    pointBackgroundColor: '#0070F2',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { callbacks: { label: ctx => `₩${ctx.raw.toLocaleString()}` } }
                },
                scales: {
                    y: { beginAtZero: true, ticks: { callback: v => `₩${(v/10000).toFixed(0)}만` }, grid: { color: '#F0F0F0' } },
                    x: { grid: { display: false } }
                }
            }
        });
    } catch(e) { console.warn('매출 차트 실패:', e); }
}

async function loadInventoryChart() {
    try {
        const res = await fetch("/inventory/InventorySnapshots?$orderby=snapshotDate desc&$select=snapshotDate,quantity,availableQty&$top=175");

        if (!res.ok) return;
        const data = await res.json();
        const items = data.value || [];
        // Aggregate by date
        const dateMap = {};
        items.forEach(i => {
            const d = i.snapshotDate;
            if (!dateMap[d]) dateMap[d] = { total: 0, available: 0 };
            dateMap[d].total += parseFloat(i.quantity);
            dateMap[d].available += parseFloat(i.availableQty);
        });
        const dates = Object.keys(dateMap).sort().slice(-7);
        const totals = dates.map(d => dateMap[d].total);
        const avails = dates.map(d => dateMap[d].available);
        const labels = dates.map(d => { const p = d.split('-'); return `${p[1]}/${p[2]}`; });

        if (inventoryChart) inventoryChart.destroy();
        inventoryChart = new Chart(document.getElementById('chartInventory'), {
            type: 'line',
            data: {
                labels,
                datasets: [

async function loadSupplyChainGraph() {
    try {
        const [supRes, matRes, prodRes, storeRes, pmRes, spRes] = await Promise.all([
            fetch("/inventory/Suppliers?$top=10&$select=ID,name&$filter=isActive eq true"),
            fetch("/inventory/Materials?$top=15&$select=ID,name,supplier_ID&$filter=isActive eq true"),
            fetch("/inventory/Products?$top=10&$select=ID,name&$filter=isActive eq true"),
            fetch("/inventory/Stores?$top=5&$select=ID,name&$filter=isActive eq true"),
            fetch("/inventory/ProductMaterials?$top=30&$select=product_ID,material_ID"),
            fetch("/inventory/StoreProducts?$top=30&$select=store_ID,product_ID&$filter=isActive eq true")
        ]);
        const suppliers = (await supRes.json()).value || [];
        const materials = (await matRes.json()).value || [];
        const products = (await prodRes.json()).value || [];
        const stores = (await storeRes.json()).value || [];
        const prodMats = (await pmRes.json()).value || [];
        const storePrds = (await spRes.json()).value || [];

        var nodes = [];
        var edges = [];
        var nodeIds = new Set();

        suppliers.forEach(function(s) { nodes.push({id:"S_"+s.ID, label:"🟣 "+s.name+"\n(공급업체)", group:"supplier", shape:"box", color:{background:"#EDE7F6",border:"#7C4DFF"}, font:{color:"#333",size:11,multi:true}, margin:8}); nodeIds.add("S_"+s.ID); });
        materials.forEach(function(m) { nodes.push({id:"M_"+m.ID, label:"🟡 "+m.name+"\n(자재)", group:"material", shape:"box", color:{background:"#FFF8E1",border:"#FFC107"}, font:{color:"#333",size:10,multi:true}, margin:6}); nodeIds.add("M_"+m.ID); });
        products.forEach(function(p) { nodes.push({id:"P_"+p.ID, label:"🔵 "+p.name+"\n(상품)", group:"product", shape:"box", color:{background:"#E3F2FD",border:"#1976D2"}, font:{color:"#333",size:11,multi:true}, margin:8}); nodeIds.add("P_"+p.ID); });
        stores.forEach(function(st) { nodes.push({id:"T_"+st.ID, label:"🟢 "+st.name+"\n(점포)", group:"store", shape:"box", color:{background:"#E8F5E9",border:"#43A047"}, font:{color:"#333",size:12,multi:true}, margin:10}); nodeIds.add("T_"+st.ID); });

        materials.forEach(function(m) {
            if (m.supplier_ID && nodeIds.has("S_"+m.supplier_ID) && nodeIds.has("M_"+m.ID)) {
                edges.push({from:"S_"+m.supplier_ID, to:"M_"+m.ID, color:{color:"#CE93D8"}, arrows:"to", width:2, label:"공급", font:{size:9,color:"#7B1FA2"}});
            }
        });
        prodMats.forEach(function(pm) {
            if (nodeIds.has("M_"+pm.material_ID) && nodeIds.has("P_"+pm.product_ID)) {
                edges.push({from:"M_"+pm.material_ID, to:"P_"+pm.product_ID, color:{color:"#90CAF9"}, arrows:"to", width:2, label:"BOM", font:{size:9,color:"#1565C0"}});
            }
        });
        storePrds.forEach(function(sp) {
            if (nodeIds.has("P_"+sp.product_ID) && nodeIds.has("T_"+sp.store_ID)) {
                edges.push({from:"P_"+sp.product_ID, to:"T_"+sp.store_ID, color:{color:"#A5D6A7"}, arrows:"to", width:2, label:"판매", font:{size:9,color:"#2E7D32"}});
            }
        });

        var container = document.getElementById("supplyChainGraph");
        if (!container) return;
        var data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
        var options = {
            physics: { solver: "forceAtlas2Based", forceAtlas2Based: { gravitationalConstant: -40, centralGravity: 0.005, springLength: 120 }, stabilization: { iterations: 100 } },
            interaction: { hover: true, tooltipDelay: 200 },
            layout: { improvedLayout: true }
        };
        var network = new vis.Network(container, data, options); network.once("stabilizationIterationsDone", function() { network.moveTo({scale:0.6}); });
    } catch(e) { console.warn("Supply Chain Graph 로드 실패:", e); }
}
function selectTopMenu(id) {
    activeTopMenuId = id;
    document.querySelectorAll('.top-menu-item').forEach(b => b.classList.toggle('active', b.dataset.id === id));
    const top = menuTree.find(m => m.ID === id);
    if (!top) return;
    renderSidebar(top.children || []);
    if ((!top.children || top.children.length === 0) && top.url) showContentFrame(top.url);
}

function renderSidebar(mids) {
    const sb = document.getElementById('sidebar');
    if (!mids || !mids.length) { sb.innerHTML = '<div style="padding:1.5rem 1.1rem;color:var(--text-tertiary);font-size:0.8rem;text-align:center;">하위 메뉴가 없습니다</div>'; return; }
    let h = '';
    mids.forEach(m => {
        h += `<div class="nav-group-title"><span class="group-icon">${m.icon||'📁'}</span> ${m.title}</div>`;
        if (m.children && m.children.length) {
            m.children.forEach(s => {
                h += `<a class="nav-item" data-id="${s.ID}" onclick="selectSubMenu('${s.ID}','${(s.url||'').replace(/'/g,"\\'")}')"><span class="nav-icon">${s.icon||'📄'}</span><span class="nav-text">${s.title}</span></a>`;
            });
        } else if (m.url) {
            h += `<a class="nav-item" data-id="${m.ID}" onclick="selectSubMenu('${m.ID}','${(m.url||'').replace(/'/g,"\\'")}')"><span class="nav-icon">📄</span><span class="nav-text">${m.title} 열기</span></a>`;
        }
    });
    sb.innerHTML = h;
}

function selectSubMenu(id, url) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.dataset.id === id));
    if (url) showContentFrame(url);
}

function showContentFrame(url) {
    document.getElementById('welcomeView').style.display = 'none';
    const wrap = document.getElementById('contentFrameWrap');
    const loader = document.getElementById('frameLoader');
    const f = document.getElementById('contentFrame');
    wrap.style.display = 'block'; document.getElementById('main').scrollTop = 0; window.scrollTo(0,0);
    loader.classList.remove('hidden');
    f.src = url;
    f.onload = () => { loader.classList.add('hidden'); };
}

function toggleSidebar() {
    const sb = document.getElementById('sidebar'), mn = document.getElementById('main');
    if (window.innerWidth <= 768) sb.classList.toggle('mobile-open');
    else { sb.classList.toggle('collapsed'); mn.classList.toggle('expanded'); }
}

// iframe에서 오는 navigateTo 메시지 수신
window.addEventListener("message", function(e) {
    if (e.data && e.data.type === "navigateTo" && e.data.url) {
        showContentFrame(e.data.url); highlightMenuForUrl(e.data.url);
    }
});

// URL에 해당하는 메뉴 항목을 active로 표시
function highlightMenuForUrl(url) {
    // 메뉴 트리에서 URL 매칭 → 상단 메뉴 선택 → 사이드바 렌더링 → nav-item active
    for (var t = 0; t < menuTree.length; t++) {
        var top = menuTree[t];
        if (!top.children) continue;
        for (var m = 0; m < top.children.length; m++) {
            var mid = top.children[m];
            // 중메뉴 직접 매칭
            if (mid.url && url.indexOf(mid.url) !== -1) {
                selectTopMenu(top.ID);
                setTimeout(function() {
                    document.querySelectorAll(".nav-item").forEach(function(el) { el.classList.toggle("active", el.dataset.id === mid.ID); });
                }, 50);
                return;
            }
            // 소메뉴 탐색
            if (mid.children) {
                for (var s = 0; s < mid.children.length; s++) {
                    var sub = mid.children[s];
                    if (sub.url && url.indexOf(sub.url) !== -1) {
                        selectTopMenu(top.ID);
                        setTimeout(function() {
                            document.querySelectorAll(".nav-item").forEach(function(el) { el.classList.toggle("active", el.dataset.id === sub.ID); });
                        }, 50);
                        return;
                    }
                }
            }
        }
    }
}

<script>
// ═══════════════════════════════════════════════════════════════
// AI Chat Side Panel Logic
// ═══════════════════════════════════════════════════════════════
let chatHistory = [];
let chatOpen = false;
let chatSending = false;

function toggleChat() {
    chatOpen = !chatOpen;
    const panel = document.getElementById('chatPanel');
    const tab = document.getElementById('chatToggleTab');
    const main = document.getElementById('main');
    if (chatOpen) {
        panel.classList.add('open');
        tab.classList.add('hidden');
        main.classList.add('chat-open');
        document.getElementById('chatInput').focus();
    } else {
        panel.classList.remove('open');
        tab.classList.remove('hidden');
        main.classList.remove('chat-open');
    }
}

function handleChatKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
}

function autoResizeInput(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}

function appendMessage(role, content) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `chat-msg ${role}`;
    if (role === 'assistant') { msgDiv.innerHTML = renderMarkdown(content); checkAndLinkForecast(content, msgDiv); }
    else if (role === 'system') { msgDiv.innerHTML = content; }
    else { msgDiv.textContent = content; }
    const container = document.getElementById('chatMessages');
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
}

// 수요 예측 응답 감지 & 시각화 페이지 연동
function checkAndLinkForecast(content, msgDiv) {
    // 예측 테이블 패턴 감지: | 날짜 | 예측 | 하한 | 상한 |
    // 예측 테이블 패턴 감지: | 날짜 | 예측 | 하한 | 상한 | 또는 "수요 예측" 키워드
    const tableRegex = /\|\s*\d{4}-\d{2}-\d{2}\s*\|\s*[\d.]+\s*\|\s*[\d.]+\s*\|\s*[\d.]+\s*\|/g;
    const matches = content.match(tableRegex);
    const hasForecastKeyword = /수요\s*예측\s*결과|예측\s*판매량|forecastQty|발주\s*추천|추천\s*발주/i.test(content);
    if (!matches && !hasForecastKeyword) return;
    if (matches && matches.length < 2 && !hasForecastKeyword) return;

    // 테이블 데이터 파싱
    const tableData = (matches || []).map(row => {
        const cells = row.split("|").filter(c => c.trim());
        return {
            date: cells[0].trim(),
            forecast: parseFloat(cells[1]),
            low: parseFloat(cells[2]),
            high: parseFloat(cells[3])
        };
    }).filter(r => !isNaN(r.forecast));

    

    // KPI 추출
    // KPI 추출 (tableData가 비어있어도 안전)
    const avgForecast = tableData.length > 0 ? (tableData.reduce((s,r) => s + r.forecast, 0) / tableData.length).toFixed(1) : "-";
    const trendMatch = content.match(/추세\s*변화율[：:]?\s*([+\-]?\d+%)/);
    const modelMatch = content.match(/모델[：:]?\s*([^\n(]+)/);
    const peakRow = tableData.length > 0 ? tableData.reduce((max, r) => r.forecast > max.forecast ? r : max, tableData[0]) : null;

    // 분석 섹션 파싱 (테이블/리스트/다양한 형식 모두 지원)
    const analysis = [];
    function extractSection(text, titlePattern) {
        const regex = new RegExp(titlePattern + '[\\s\\S]*?(?=#{2,}\\s|$)', 'i');
        const match = text.match(regex);
        if (!match) return [];
        const section = match[0];
        const items = [];
        // 테이블 형식: | key | value |
        const tableRows = section.match(/\|\s*[^|\-][^|]*\|\s*[^|]+\|/g);
        if (tableRows) {
            tableRows.forEach(function(row) {
                const cells = row.split('|').filter(function(c) { return c.trim() && !c.match(/^[\-]+$/); });
                if (cells.length >= 2) items.push(cells[0].trim() + ': ' + cells[1].trim());
            });
        }
        // 리스트 형식: - text 또는 • text
        const listItems = section.match(/^\s*[-•]\s*.+/gm);
        if (listItems) {
            listItems.forEach(function(li) { items.push(li.replace(/^\s*[-•]\s*/, '').replace(/\*\*/g, '')); });
        }
        return items;
    }
    var tsItems = extractSection(content, '시계열\\s*분석');
    if (tsItems.length > 0) analysis.push({ title: "📊 시계열 분석", items: tsItems });
    var extItems = extractSection(content, '외부\\s*요인');
    if (extItems.length > 0) analysis.push({ title: "🌍 외부 요인", items: extItems });
    var keyItems = extractSection(content, '(핵심\\s*사유|예측\\s*사유)');
    if (keyItems.length > 0) analysis.push({ title: "💡 핵심 사유", items: keyItems });
    var confItems = extractSection(content, '예측\\s*신뢰');
    if (confItems.length > 0) analysis.push({ title: "🎯 예측 신뢰도", items: confItems });
    // Fallback: analysis가 비어있으면 content에서 직접 추출
    if (analysis.length === 0) {
        var sections = content.split(/#{2,}\s*/g).filter(function(s) { return s.trim().length > 10; });
        sections.forEach(function(sec) {
            var lines = sec.split("\n").filter(function(l) { return l.trim(); });
            if (lines.length < 2) return;
            var title = lines[0].replace(/[#*]/g, "").trim();
            if (title.match(/예측\s*결과|데이터\s*테이블/)) return;
            var items = [];
            for (var i = 1; i < lines.length; i++) {
                var line = lines[i].trim();
                if (line.startsWith("|") && !line.match(/^\|[-\s]+\|/)) {
                    var cells = line.split("|").filter(function(c) { return c.trim(); });
                    if (cells.length >= 2) items.push(cells[0].trim() + ": " + cells[1].trim());
                } else if (line.startsWith("-") || line.startsWith("•")) {
                    items.push(line.replace(/^[-•]\s*/, "").replace(/\*\*/g, ""));
                }
            }
            if (items.length > 0 && title) {
                analysis.push({ title: title.slice(0, 30), items: items.slice(0, 8) });
            }
        });
    }
    // localStorage에 저장
    // 점포명/상품명 추출 (AI 응답에서)
    var storeNames = ["강남 본점","서초 지점","잠실 지점","여의도 지점","홍대 지점","부산 해운대점","대구 동성로점","인천 송도점","광주 충장로점","대전 둔산점"];
    var detectedStore = "";
    var detectedProduct = "";
    storeNames.forEach(function(sn) { if (content.indexOf(sn) !== -1) detectedStore = sn; });
    // 상품명 추출 (간단한 방식)
    var qMatch = null;
    try { qMatch = content.match(/"([^"]{2,30})"/); } catch(e) {}
    if (qMatch) detectedProduct = qMatch[1];
    if (!detectedProduct && detectedStore) {
        var idx2 = content.indexOf(detectedStore);
        if (idx2 !== -1) {
            var after = content.substring(idx2 + detectedStore.length, idx2 + detectedStore.length + 60);
            var words = after.replace(/[^\uAC00-\uD7AF\u0020a-zA-Z0-9]/g, " ").trim().split(/\s+/);
            if (words.length >= 1 && words[0].length >= 2) detectedProduct = words.slice(0, 3).join(" ").trim();
        }
    }
    const forecastData = {
        meta: "AI 예측 결과 | " + (detectedStore || "") + " / " + (detectedProduct || "") + " | " + new Date().toLocaleString("ko-KR"),
        storeName: detectedStore,
        productName: detectedProduct,
        kpi: {
            avg: avgForecast,
            trend: trendMatch ? trendMatch[1] : "-",
            peak: peakRow ? peakRow.date.slice(5) : "-",
            model: modelMatch ? modelMatch[1].trim().slice(0,20) : "AI"
        },
        table: tableData,
        analysis: analysis.length > 0 ? analysis : [{ title: "📊 분석 요약", items: ["데이터 기반 예측 완료"] }]
    };
    localStorage.setItem("forecastData", JSON.stringify(forecastData));

    // "상세 보기" 버튼 추가
    const btn = document.createElement("div");
    btn.style.cssText = "margin-top:12px;padding:8px 14px;background:linear-gradient(135deg,#0070F2,#6B4FBB);color:white;border-radius:8px;font-size:0.75rem;font-weight:600;cursor:pointer;display:block;width:fit-content;";
    btn.textContent = "📊 예측 결과 상세 보기";
    btn.onclick = function() {
        showContentFrame("/demandforecasts/webapp/index.html"); highlightMenuForUrl("/demandforecasts/webapp/index.html");
        var frame = document.getElementById("contentFrame");
        var origOnload = frame.onload;
        frame.onload = function() { document.getElementById('frameLoader').classList.add('hidden'); setTimeout(function() { frame.contentWindow.postMessage({type:"forecastUpdate"}, "*"); }, 200); };
    };
    if (!/발주\s*추천|추천\s*발주/i.test(content)) { msgDiv.appendChild(btn); }

    // 발주 추천 감지 & 데이터 파싱 & 버튼 추가
    var hasOrderRec = /발주\s*추천|추천\s*발주|order\s*recommend/i.test(content);
    if (hasOrderRec) {
        // 발주 추천 데이터 파싱 (리스트 형식: "- 키: 값")
        function extractVal(text, pattern) {
            // Remove markdown bold markers before matching
            var clean = text.replace(/\*\*/g, "");
            var m = clean.match(pattern);
            return m ? m[1].trim() : "";
        }
        function extractNum(text, pattern) {
            // Remove markdown bold markers before matching
            var clean = text.replace(/\*\*/g, "");
            var m = clean.match(pattern);
            if (!m) return 0;
            return parseFloat(m[1].replace(/[,]/g, "")) || 0;
        }
        // 상품명
        var recProduct = extractVal(content, /상품명[：:]\s*(.+)/i) || detectedProduct || "";
        // ML 예측 - 유연한 패턴 (숫자 뒤 "개" 등 단위 허용)
        var mlCurrentStock = extractNum(content, /현재\s*재고[：:]*\s*([\d,.]+)/i);
        var mlSafetyStock = extractNum(content, /안전\s*재고[：:]*\s*([\d,.]+)/i);
        var mlReorderPoint = extractNum(content, /재주문\s*시점[：:]*\s*([\d,.]+)/i);
        var mlRecommendedQty = extractNum(content, /추천\s*발주\s*수량[：:]*\s*([\d,.]+)/i) || extractNum(content, /추천\s*조치[：:]*\s*([\d,.]+)/i);
        var mlEstimatedCost = extractVal(content, /예상\s*비용[：:]*\s*([^\n]+)/i);
        var mlUrgency = extractVal(content, /긴급도[：:]*\s*([^\n(]+)/i);
        var mlStockDays = extractVal(content, /재고\s*(?:소진|지속)\s*(?:예상|일수)[：:]*\s*([^\n]+)/i);
        var mlModel = extractVal(content, /모델[：:]\s*([^\n]+)/i);
        // RPT-1 예측 - 다양한 형식 매칭
        var rptTotal = extractNum(content, /총\s*7일\s*예측\s*수[량:：]*\s*([\d,.]+)/i) || extractNum(content, /7일\s*총\s*수요\s*예측[：:]*\s*([\d,.]+)/i) || extractNum(content, /향후\s*7일\s*수요\s*예측[：:]*\s*([\d,.]+)/i) || extractNum(content, /RPT.*7일.*예측[：:]*\s*([\d,.]+)/i) || extractNum(content, /7일\s*수요\s*예측[：:]*\s*([\d,.]+)/i);
        var rptDaily = extractNum(content, /일\s*평균\s*예측\s*수[량:：]*\s*([\d,.]+)/i) || extractNum(content, /일\s*평균\s*수요\s*예측[：:]*\s*([\d,.]+)/i) || extractNum(content, /예측\s*일\s*평균\s*수요[：:]*\s*([\d,.]+)/i) || extractNum(content, /RPT.*일\s*평균[：:]*\s*([\d,.]+)/i) || extractNum(content, /일\s*평균[：:]*\s*([\d,.]+)개/i);
        // 시계열 분석 - 유연한 패턴
        var ts7day = extractNum(content, /최근\s*7일\s*평균[：:]*\s*([\d,.]+)/i);
        var ts30day = extractNum(content, /최근\s*30일\s*평균[：:]*\s*([\d,.]+)/i);
        var tsTrend = extractVal(content, /추세\s*변화율[：:]*\s*([^\n]+)/i);
        // 외부 요인 - 유연한 패턴
        var extDay = extractVal(content, /오늘[：:]*\s*([^\n]+)/i) || extractVal(content, /요일[：:]*\s*([^\n]+)/i);
        var extSeason = extractVal(content, /계절[：:]*\s*([^\n]+)/i);
        var extNews = extractVal(content, /뉴스\s*트렌드[：:]*\s*([^\n]+)/i) || extractVal(content, /신학기|트렌드[：:]*\s*([^\n]+)/i);
        // AI 종합 판단
        var aiConclusion = extractVal(content, /결론[：:]*\s*([^\n]+)/i);
        var aiConfidence = extractVal(content, /신뢰도[：:]*\s*([^\n]+)/i);
        var aiRecommend = extractVal(content, /권고[：:]*\s*([^\n]+)/i);
        // 발주 사유 - 더 넓은 범위 캡처
        var reasonSection = content.match(/발주\s*사유\s*분석[\s\S]*?(?=###|$)/i) || content.match(/발주\s*사유[:\s][\s\S]*?(?=###|$)/i);
        var reasons = [];
        if (reasonSection) {
            var rLines3 = reasonSection[0].split("\n");
            for (var r3 = 0; r3 < rLines3.length; r3++) {
                var rl = rLines3[r3].trim();
                if (rl.length > 3 && (rl.startsWith("-") || rl.indexOf(":") > 0)) {
                    reasons.push(rl.replace(/^[-•]\s*/, "").trim());
                }
            }
        }
        // Fallback: 발주 사유가 없으면 재고 분석에서 추출
        if (reasons.length === 0) {
            var stockSection = content.match(/재고\s*분석[\s\S]*?(?=###|-\s*시계열|-\s*외부|$)/i);
            if (stockSection) {
                var sLines3 = stockSection[0].split("\n");
                for (var s3 = 0; s3 < sLines3.length; s3++) {
                    var sl = sLines3[s3].trim();
                    if (sl.length > 3 && sl.startsWith("-")) {
                        reasons.push(sl.replace(/^[-•]\s*/, "").trim());
                    }
                }
            }
        }
        // priority
        var priority = "MEDIUM";
        if (/높음|HIGH/i.test(mlUrgency)) priority = "HIGH";
        else if (/낮음|LOW/i.test(mlUrgency)) priority = "LOW";

        var recData = {
            meta: "AI 발주 추천 | " + (detectedStore || "전체") + " | " + new Date().toLocaleString("ko-KR"),
            storeName: detectedStore,
            productName: recProduct,
            priority: priority,
            ml: { model: mlModel, currentStock: mlCurrentStock, safetyStock: mlSafetyStock, reorderPoint: mlReorderPoint, recommendedQty: mlRecommendedQty, estimatedCost: mlEstimatedCost, urgency: mlUrgency, stockDays: mlStockDays },
            rpt: { totalDemand7d: rptTotal, dailyAvg: rptDaily },
            timeseries: { avg7d: ts7day, avg30d: ts30day, trend: tsTrend },
            external: { day: extDay, season: extSeason, news: extNews },
            reasons: reasons,
            aiJudgment: { conclusion: aiConclusion, confidence: aiConfidence, recommendation: aiRecommend }
        };
        localStorage.setItem("orderRecommendationData", JSON.stringify(recData));
        var btn2 = document.createElement("div");
        btn2.style.cssText = "margin-top:8px;padding:8px 14px;background:linear-gradient(135deg,#E37400,#D93025);color:white;border-radius:8px;font-size:0.75rem;font-weight:600;cursor:pointer;display:block;width:fit-content;";
        btn2.textContent = "📋 발주 추천 상세 보기";
        btn2.onclick = function() {
            showContentFrame("/orderrecommendations/webapp/index.html");
            highlightMenuForUrl("/orderrecommendations/webapp/index.html");
            var frame = document.getElementById("contentFrame");
            frame.onload = function() { document.getElementById('frameLoader').classList.add('hidden'); setTimeout(function() { frame.contentWindow.postMessage({type:"recommendationUpdate"}, "*"); }, 200); };
        };
        msgDiv.appendChild(btn2);
    }
}

function renderMarkdown(text) {
    return text
        .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
}

function setTyping(show) {
    document.getElementById('chatTyping').classList.toggle('show', show);
    if (show) { const c = document.getElementById('chatMessages'); c.scrollTop = c.scrollHeight; }
}

async function sendChatMessage() {
    if (chatSending) return;
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if (!message) return;

    input.value = ''; input.style.height = 'auto';
    appendMessage('user', message);
    chatSending = true;
    document.getElementById('chatSendBtn').disabled = true;
    setTyping(true);

    try {
        const response = await fetch('/chat/sendMessage', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, history: chatHistory })
        });
        const data = await response.json();
        if (data.success !== false && data.reply) {
            appendMessage('assistant', data.reply);
            chatHistory.push({ role: 'user', content: message });
            chatHistory.push({ role: 'assistant', content: data.reply });
            if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
        } else {
            appendMessage('system', '&#x26A0;&#xFE0F; ' + (data.error || '응답을 받을 수 없습니다.'));
        }
    } catch (error) {
        appendMessage('system', '&#x26A0;&#xFE0F; 네트워크 오류가 발생했습니다.');
    } finally {
        chatSending = false;
        document.getElementById('chatSendBtn').disabled = false;
        setTyping(false);
    }
}

// Chat Panel Resize (drag to resize)
(function() {
    var handle = document.getElementById("chatResizeHandle");
    var panel = document.getElementById("chatPanel");
    var main = document.getElementById("main");
    var MIN_W = 300, MAX_W = 800;
    var isResizing = false, startX, startWidth;
    if (!handle) return;
    handle.addEventListener("mousedown", function(e) {
        isResizing = true; startX = e.clientX; startWidth = panel.offsetWidth;
        panel.classList.add("resizing"); main.classList.add("chat-resizing");
        document.body.classList.add("chat-resizing"); handle.classList.add("active");
        e.preventDefault();
    });
    document.addEventListener("mousemove", function(e) {
        if (!isResizing) return;
        var diff = startX - e.clientX;
        var nw = Math.min(MAX_W, Math.max(MIN_W, startWidth + diff));
        panel.style.width = nw + "px";
        main.style.marginRight = nw + "px";
        document.documentElement.style.setProperty("--chat-width", nw + "px");
    });
    document.addEventListener("mouseup", function() {
        if (!isResizing) return;
        isResizing = false;
        panel.classList.remove("resizing"); main.classList.remove("chat-resizing");
        document.body.classList.remove("chat-resizing"); handle.classList.remove("active");
    });
})();
</script>
