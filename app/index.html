<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>점포 상품별 재고 발주 관리 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
<header class="shell-bar">
    <button class="menu-toggle" onclick="toggleSidebar()" title="메뉴 토글">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <rect y="2" width="16" height="1.5" rx="0.75"/><rect y="7.25" width="16" height="1.5" rx="0.75"/><rect y="12.5" width="16" height="1.5" rx="0.75"/>
        </svg>
    </button>
    <a class="logo" onclick="showDashboard()">
        <div class="logo-mark">
            <svg viewBox="0 0 32 32" fill="none"><rect x="2" y="6" width="12" height="12" rx="3" fill="#0070F2"/><rect x="18" y="6" width="12" height="12" rx="3" fill="#0070F2" opacity="0.6"/><rect x="2" y="22" width="12" height="4" rx="2" fill="#0070F2" opacity="0.35"/><rect x="18" y="22" width="12" height="4" rx="2" fill="#0070F2" opacity="0.35"/></svg>
        </div>
        <div class="logo-title">
            <span class="title-main">점포별 상품 재고 발주 관리</span>
            <span class="title-sub">Inventory &amp; Order Management</span>
        </div>
    </a>
    <div class="top-menu-group" id="topMenuBar"><span style="color:var(--text-tertiary);font-size:0.78rem;">로딩중...</span></div>
    <div class="spacer"></div>
    <div class="shell-actions">
        <a href="/inventory/$metadata" title="OData Metadata">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-2px;margin-right:3px;"><circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="2" fill="currentColor"/></svg>API
        </a>
    </div>
    <div class="user-avatar" title="사용자">U</div>
</header>

<nav class="sidebar" id="sidebar">
    <div style="padding:1.5rem 1.1rem;color:var(--text-tertiary);font-size:0.8rem;text-align:center;">로딩중...</div>
</nav>

<main class="main" id="main">
    <!-- Dashboard -->
    <div class="dashboard-view" id="welcomeView">
        <div class="dash-header">
            <h2>📊 대시보드</h2>
            <span class="dash-date" id="dashDate"></span>
        </div>

        <!-- KPI Cards -->
        <div class="kpi-row" id="kpiRow">
            <div class="kpi-card"><div class="kpi-icon-wrap" style="background:var(--info-light);color:var(--info)">🏷️</div><div class="kpi-body"><span class="kpi-value" id="kpi-products">-</span><span class="kpi-label">상품</span></div></div>
            <div class="kpi-card"><div class="kpi-icon-wrap" style="background:var(--success-light);color:var(--success)">🏪</div><div class="kpi-body"><span class="kpi-value" id="kpi-stores">-</span><span class="kpi-label">점포</span></div></div>
            <div class="kpi-card"><div class="kpi-icon-wrap" style="background:var(--warning-light);color:var(--warning)">📦</div><div class="kpi-body"><span class="kpi-value" id="kpi-inventories">-</span><span class="kpi-label">재고 항목</span></div></div>
            <div class="kpi-card"><div class="kpi-icon-wrap" style="background:var(--danger-light);color:var(--danger)">📋</div><div class="kpi-body"><span class="kpi-value" id="kpi-purchaseorders">-</span><span class="kpi-label">발주</span></div></div>
            <div class="kpi-card"><div class="kpi-icon-wrap" style="background:#F3E8FD;color:#7B2FF2">🤝</div><div class="kpi-body"><span class="kpi-value" id="kpi-suppliers">-</span><span class="kpi-label">공급업체</span></div></div>
            <div class="kpi-card"><div class="kpi-icon-wrap" style="background:#E0F7FA;color:#00838F">👤</div><div class="kpi-body"><span class="kpi-value" id="kpi-customers">-</span><span class="kpi-label">고객</span></div></div>
        </div>

        <!-- Chart Cards -->
        <div class="chart-row">
            <div class="chart-card">
                <div class="chart-title"><span class="ct-icon">📈</span> 일별 매출 추이</div>
                <div class="chart-wrap"><canvas id="chartSales"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-title"><span class="ct-icon">📦</span> 재고 추이</div>
                <div class="chart-wrap"><canvas id="chartInventory"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-title"><span class="ct-icon">📋</span> 발주 승인 현황</div>
                <div class="chart-wrap"><canvas id="chartOrders"></canvas></div>
            </div>
        </div>

        <!-- Shortcuts -->

        <!-- Supply Chain Network Graph - 3탭 -->
        <div class="chart-card" style="margin-bottom:1rem;">
            <div class="chart-title" style="margin-bottom:0.2rem;">
                <span class="ct-icon">🔗</span> 공급망 네트워크 (Supply Chain)
            </div>
            <div class="sc-toolbar">
                <button class="sc-option-btn active" id="scBtnN" onclick="switchSupplyChainOption('N')">🔗 네트워크</button>
                <button class="sc-option-btn" id="scBtnA" onclick="switchSupplyChainOption('A')">🌳 상품공급</button>
                <button class="sc-option-btn" id="scBtnB" onclick="switchSupplyChainOption('B')">📊 재고상태</button>
                <select class="sc-select" id="scProductSelect" style="display:none" onchange="loadSupplyChainOptionA(this.value)">
                    <option value="">-- 상품 선택 --</option>
                </select>
                <select class="sc-select" id="scStoreSelect" style="display:none" onchange="loadSupplyChainOptionB(this.value)">
                    <option value="">-- 점포 선택 --</option>
                </select>
                <div class="sc-legend" id="scLegend">
                    <span class="sc-legend-item"><span class="sc-legend-dot" style="background:#7C4DFF;"></span> 공급업체</span>
                    <span class="sc-legend-item"><span class="sc-legend-dot" style="background:#FFC107;"></span> 자재</span>
                    <span class="sc-legend-item"><span class="sc-legend-dot" style="background:#1976D2;"></span> 상품</span>
                    <span class="sc-legend-item"><span class="sc-legend-dot" style="background:#43A047;"></span> 점포</span>
                </div>
            </div>
            <div id="supplyChainGraph" style="width:100%;height:350px;border:1px solid var(--border-light);border-radius:8px;background:#FAFBFC;"></div>
        </div>
        <div class="shortcut-section">
            <h3>⚡ 바로가기</h3>
            <div class="shortcut-row" id="shortcutGrid"></div>
        </div>
    </div>

    <div class="content-frame-wrap" id="contentFrameWrap">
        <div id="frameLoader" class="frame-loader hidden">
            <div style="text-align:center"><div class="spinner"></div><div class="loader-text">앱 로딩 중...</div></div>
        </div>
        <iframe id="contentFrame"></iframe>
    </div>
</main>



<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- AI Chat Side Panel (연보라 테마) -->
<!-- ═══════════════════════════════════════════════════════════════ -->


<!-- Chat Toggle Tab -->
<div class="chat-toggle-tab" id="chatToggleTab" onclick="toggleChat()">
    <span class="tab-icon">&#x1F916;</span>
    <span class="tab-text">AI</span>
</div>

<!-- Chat Side Panel -->
<div class="chat-side-panel" id="chatPanel">
    <div class="chat-resize-handle" id="chatResizeHandle"></div>
    <div class="chat-header">
        <div class="chat-avatar">&#x1F916;</div>
        <div class="chat-info">
            <div class="chat-name">Store AI</div>
            <div class="chat-status">재고·발주·매출 분석</div>
        </div>
        <button class="chat-collapse" onclick="toggleChat()" title="접기">&#x276E;</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="chat-msg assistant">
            안녕하세요! &#x1F44B; <strong>Store AI</strong>입니다.<br>
            재고, 매출, 고객 분석 등 무엇이든 물어보세요!
        </div>
    </div>
    <div class="chat-typing" id="chatTyping">
        <span></span><span></span><span></span>
    </div>
    <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" placeholder="질문을 입력하세요..." rows="1"
                  onkeydown="handleChatKey(event)" oninput="autoResizeInput(this)"></textarea>
        <button class="chat-send" id="chatSendBtn" onclick="sendChatMessage()" title="전송">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>
<script src="js/chat.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/supply-chain.js"></script>
</body>
</html>
